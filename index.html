<style>

  }
  *{box-sizing:border-box; margin:0; padding:0;}

    display:inline-block; font-family:'Inter',sans-serif; font-weight:600; font-size:16px; color:#fff;
    background:var(--coral); border:none; padding:16px 36px; border-radius:100px; cursor:pointer;
    text-decoration:none; transition:transform .2s ease, box-shadow .2s ease;
  }
  .watch-btn:hover{transform:translateY(-2px); box-shadow:0 12px 30px -8px rgba(255,107,74,0.5);}

  .privacy-link{
    position:fixed; bottom:22px; left:0; right:0; text-align:center; font-family:'IBM Plex Mono',monospace;
    font-size:11px; color:var(--slate-light); opacity:0.5;
