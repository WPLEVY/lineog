<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LINEOG — Would you trust this advisor?</title>
<meta name="description" content="A trusted advisor prepares before giving advice. LINEOG exists because intelligence isn't enough.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --plum:#1A1035; --plum-soft:#261A47; --lav:#FAF8FF; --coral:#FF6B4A; --coral-soft:#FF8A6E; --slate-light:#A8A3C7;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html, body{
    height:100%; overflow:hidden; background:#000; color:var(--lav); font-family:'Inter',sans-serif;
  }
  ::selection{background:var(--coral); color:#000;}

  #stage{
    position:fixed; inset:0; overflow:hidden;
  }
  #ambient{
    position:absolute; inset:0;
    background:radial-gradient(ellipse at 50% 40%, #241E44 0%, #0A0716 75%);
    transition:background 2.5s ease;
  }
  #ambient.dimmed{
    background:radial-gradient(ellipse at 50% 40%, #170F2E 0%, #050308 75%);
  }

  #textLayer{
    position:absolute; inset:0; z-index:2; display:flex; align-items:center; justify-content:center;
    max-width:900px; margin:0 auto; padding:0 28px; text-align:center;
  }
  .stage-line{
    font-family:'Space Grotesk',sans-serif; font-weight:600; font-size:clamp(19px,3.4vw,28px);
    line-height:1.6; color:var(--lav); opacity:0;
    transition:opacity .6s ease;
  }
  .stage-line.show{opacity:1;}
  .stage-line.dim{font-family:'Inter',sans-serif; font-weight:400; font-size:clamp(15px,2.4vw,19px); color:var(--slate-light);}
  .stage-line.accent{color:var(--coral-soft);}

  #wordmarkLayer{
    position:absolute; inset:0; z-index:2; display:flex; align-items:center; justify-content:center; gap:9px; opacity:0; transition:opacity 1.2s ease;
  }
  #wordmarkLayer.show{opacity:1;}
  #wordmarkLayer span.word{font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:20px; color:var(--coral-soft); transition:font-size .6s ease;}
  #wordmarkLayer.big span.word{font-size:40px; letter-spacing:0.01em;}

  #signatureLayer{
    position:absolute; inset:0; z-index:6; display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:14px; opacity:0; transition:opacity 1.4s ease; cursor:pointer;
  }
  #signatureLayer.show{opacity:1;}
  #signatureLayer .sig-word{font-family:'Space Grotesk',sans-serif; font-weight:600; font-size:15px; letter-spacing:0.08em; color:var(--slate-light);}
  #signatureLayer .sig-hint{font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--coral-soft); opacity:0.8;}
  #signatureLayer.hidden{display:none;}

  #meetingVideo{
    position:absolute; inset:0; z-index:1; width:100%; height:100%; object-fit:cover; object-position:center;
    opacity:0; transition:opacity 1s ease; background:#000;
  }
  #meetingVideo.show{opacity:1;}

  @media (max-aspect-ratio: 4/5){
    #meetingVideo{ object-fit:contain; }
  }

  .stage-page{opacity:1;}
  .page-line{
    font-family:'Space Grotesk',sans-serif; font-weight:600; font-size:clamp(17px,2.8vw,23px);
    line-height:1.7; color:var(--lav); margin-bottom:22px; letter-spacing:0.01em;
    opacity:0;
    transition:opacity .6s ease;
  }
  .stage-page.show .page-line{opacity:1;}
  .page-line:first-child{font-size:clamp(20px,3.4vw,28px); font-weight:700;}
  .page-line.accent{color:var(--coral-soft);}
  .lineog-word{color:var(--coral-soft);}
  .emphasis-word{color:var(--coral-soft);}

  #waitingDots{
    position:absolute; inset:0; z-index:2; display:flex; align-items:center; justify-content:center; gap:6px; opacity:0; transition:opacity .4s ease;
  }
  #waitingDots.show{opacity:1;}
  #waitingDots span{width:6px; height:6px; border-radius:50%; background:var(--slate-light); animation:dot-pulse 1.2s ease-in-out infinite;}
  #waitingDots span:nth-child(2){animation-delay:.2s;}
  #waitingDots span:nth-child(3){animation-delay:.4s;}
  @keyframes dot-pulse{ 0%,80%,100%{opacity:0.25;} 40%{opacity:1;} }

  #finalScene{
    position:absolute; inset:0; z-index:2; align-items:center; justify-content:center; flex-direction:column;
    text-align:center; max-width:520px; margin:0 auto; padding:0 28px;
    opacity:0; transition:opacity .3s ease; display:none;
  }
  #finalScene.show{opacity:1;}
  .final-wordmark{
    display:flex; align-items:center; justify-content:center; gap:9px;
    opacity:0; transition:opacity .6s ease;
  }
  #finalScene.show .final-wordmark{opacity:1;}
  .final-wordmark .word{font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:40px; color:var(--coral-soft);}
  .final-tagline{
    font-family:'Inter',sans-serif; font-size:15px; color:var(--slate-light); margin-top:16px;
    opacity:0; transition:opacity .6s ease 1s;
  }
  #finalScene.show .final-tagline{opacity:1;}
  .final-cta-group{
    opacity:0; transition:opacity .6s ease 2s;
  }
  #finalScene.show .final-cta-group{opacity:1;}
  .become-btn{
    display:inline-block; font-family:'Inter',sans-serif; font-weight:600; font-size:16px; color:#fff;
    background:var(--coral); border:none; padding:16px 34px; border-radius:100px; cursor:pointer;
    margin-top:30px; text-decoration:none; transition:transform .2s ease, box-shadow .2s ease;
  }
  .become-btn:hover{transform:translateY(-2px); box-shadow:0 12px 30px -8px rgba(255,107,74,0.5);}
  .final-sub{font-size:13px; color:var(--slate-light); margin-top:14px;}

  #scrubberWrap{
    position:fixed; bottom:54px; left:0; right:0; z-index:5; display:flex; justify-content:center;
    opacity:0.35; transition:opacity .3s ease; padding:0 30px;
  }
  #scrubberWrap:hover{opacity:0.9;}
  .scrubber-inner{position:relative; width:100%; max-width:420px;}
  #scrubberMarker{
    position:absolute; top:-2px; width:2px; height:6px; background:var(--coral-soft);
    pointer-events:none; left:0%;
  }
  #scrubber{
    -webkit-appearance:none; appearance:none; width:100%; max-width:420px; height:2px;
    background:rgba(255,255,255,0.2); border-radius:2px; outline:none; cursor:pointer;
  }
  #scrubber::-webkit-slider-thumb{
    -webkit-appearance:none; width:11px; height:11px; border-radius:50%;
    background:var(--coral-soft); cursor:pointer; margin-top:-4.5px;
  }
  #scrubber::-moz-range-thumb{
    width:11px; height:11px; border-radius:50%; background:var(--coral-soft); border:none; cursor:pointer;
  }
  #scrubber::-webkit-slider-runnable-track{height:2px; background:transparent;}
  #controls{
    position:fixed; bottom:22px; left:0; right:0; z-index:5; display:flex; gap:18px; justify-content:center;
    opacity:0.35; transition:opacity .3s ease;
  }
  #controls:hover{opacity:0.9;}
  #controls button{
    font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--slate-light); background:none;
    border:none; cursor:pointer; letter-spacing:0.04em;
  }
  #controls button:hover{color:var(--lav);}

  #privacyLink{
    position:fixed; bottom:22px; right:22px; z-index:5; font-family:'IBM Plex Mono',monospace; font-size:10px;
    color:var(--slate-light); opacity:0.35; text-decoration:none;
  }
  #privacyLink:hover{opacity:0.8;}

  @media (prefers-reduced-motion: reduce){
    .stage-line, #wordmarkLayer, #finalScene, #ambient{transition:opacity .3s ease;}
  }
</style>
</head>
<body>

<div id="stage">
  <div id="ambient"></div>

  <video id="meetingVideo" playsinline src="meeting-scene.mp4"></video>

  <div id="textLayer">
    <p class="stage-line" id="currentLine"></p>
  </div>

  <div id="wordmarkLayer">
    <span class="word">LINEOG</span>
  </div>

  <div id="signatureLayer" onclick="beginExperience()">
    <span class="sig-word">LINEOG</span>
    <span class="sig-hint">Tap to begin, with sound</span>
  </div>

  <div id="waitingDots"><span></span><span></span><span></span></div>

  <div id="finalScene">
    <div class="final-wordmark">
      <span class="word">LINEOG</span>
    </div>
    <p class="final-tagline">An advisor you can trust</p>
    <div class="final-cta-group">
      <a class="become-btn" href="what-lineog-gives-you.html" id="ctaButton">Find Out More</a>
    </div>
  </div>
</div>

<div id="scrubberWrap">
  <div class="scrubber-inner">
    <input type="range" id="scrubber" min="0" max="1000" value="0">
    <div id="scrubberMarker"></div>
  </div>
</div>
<div id="controls">
  <button id="restartBtn" onclick="restartSequence()">↺ Start Over</button>
  <button id="pauseBtn" onclick="togglePause()">❚❚ Pause</button>
  <button id="skipBtn" onclick="skipScene()">Skip →</button>
</div>
<div id="privacyLink"><a href="privacy.html" style="color:inherit; text-decoration:none;">Privacy</a> · <a href="terms.html" style="color:inherit; text-decoration:none;">Terms</a></div>

<script>
  // ---------- THE SCENE ENGINE ----------
  // One fixed screen. Text replaces itself, it never stacks. The room
  // persists as ambient light, not literal illustration, and shifts once,
  // quietly, at the moment of realization. No scroll involved at all.

  const script = [
    { scene:2, text: 'The meeting was over.', hold:2800, pauseAfter:500 },
    { scene:2, text: 'Not because the recommendation was wrong.', hold:3200, pauseAfter:500 },
    { scene:2, text: "Because the client didn't <span class='emphasis-word'>trust</span> the advisor anymore.", hold:4000, pauseAfter:1000 },
    { scene:2, text: 'The moment you question your advisor...', hold:2800, pauseAfter:400 },
    { scene:2, text: "...you question every recommendation they made.", hold:5000, pauseAfter:1500 },

    { scene:3, page:[
        "We've all experienced it.",
        "AI forgets the day. The time. The context."
      ], hold:7500, pauseAfter:1000 },
    { scene:3, page:[
        "An advisor should always be present."
      ], hold:5000, pauseAfter:1500 },

    { scene:4, page:[
        "That's why we built <span class='lineog-word'>LINEOG</span>.",
        "You deserve an advisor you can trust."
      ], hold:6500, pauseAfter:1000 },
    { scene:4, page:[
        "One that isn't afraid to ask questions."
      ], hold:6500, pauseAfter:1500 },

    { scene:5, page:[
        "Trust isn't built in a single conversation.",
        "It's built over time."
      ], staggerDelay:1.5, hold:7000, pauseAfter:1200 },
    { scene:5, text: "The next generation of AI isn't just smarter...", hold:3500, pauseAfter:800 },
    { scene:5, text: "It's present.", accent:true, hold:5000, pauseAfter:2500 },
    { scene:5, end:true, hold:0 }
  ];

  // ---------- SCRUBBER: one continuous timeline spanning video + text ----------
  let VIDEO_DURATION = 37.5; // fallback until real metadata loads
  videoEl.addEventListener('loadedmetadata', () => {
    if(videoEl.duration && isFinite(videoEl.duration)){
      VIDEO_DURATION = videoEl.duration;
      buildTimeline();
      positionMarker();
    }
  });

  function positionMarker(){
    const pct = (VIDEO_DURATION / totalDuration) * 100;
    document.getElementById('scrubberMarker').style.left = pct + '%';
  }

  let timelineSteps = [];
  let totalDuration = VIDEO_DURATION;
  function buildTimeline(){
    timelineSteps = [];
    let cum = VIDEO_DURATION;
    script.forEach((step) => {
      const pauseBefore = step === script[0] ? 0 : (script[script.indexOf(step) - 1].pauseAfter || 700);
      cum += pauseBefore;
      timelineSteps.push({ segmentStart: cum, holdEnd: cum + (step.hold || 0) });
      cum += (step.hold || 0);
    });
    totalDuration = cum || VIDEO_DURATION;
  }
  buildTimeline();
  positionMarker();

  let isDraggingScrubber = false;
  let stepStartedAt = 0;       // Date.now() when this step's content actually appeared
  let segmentEnteredAt = 0;    // Date.now() when we started waiting to enter this step (pause included)

  function currentVirtualTime(){
    if(videoEl.classList.contains('show')){
      return videoEl.currentTime;
    }
    if(idx > 0 && idx <= timelineSteps.length){
      const seg = timelineSteps[idx - 1];
      const elapsedSinceSegmentStart = (Date.now() - segmentEnteredAt) / 1000;
      return Math.min(seg.segmentStart + elapsedSinceSegmentStart, seg.holdEnd);
    }
    return 0;
  }

  setInterval(() => {
    if(isDraggingScrubber) return;
    const t = currentVirtualTime();
    document.getElementById('scrubber').value = Math.min(1000, (t / totalDuration) * 1000);
  }, 200);

  function seekToVirtualTime(t){
    clearTimeout(pendingTimeout);
    t = Math.max(0, Math.min(t, totalDuration - 0.1));

    if(t < VIDEO_DURATION){
      hideAll();
      finalEl.classList.remove('show');
      finalEl.style.display = 'none';
      signatureEl.classList.add('hidden');
      videoEl.classList.add('show');
      document.getElementById('skipBtn').style.display = 'inline';
      document.getElementById('skipBtn').textContent = 'Skip →';
      videoEl.currentTime = t;
      videoEl.play().catch(() => {});
      return;
    }

    videoEl.pause();
    videoEl.classList.remove('show');
    document.getElementById('skipBtn').textContent = 'Skip to End →';

    let targetIdx = timelineSteps.length - 1;
    for(let i = 0; i < timelineSteps.length; i++){
      if(t < timelineSteps[i].holdEnd){ targetIdx = i; break; }
    }
    idx = targetIdx;
    hideAll();
    const step = script[idx];
    segmentEnteredAt = Date.now() - Math.max(0, t - timelineSteps[idx].segmentStart) * 1000;
    stepStartedAt = Date.now();
    renderStep(step);
    const remaining = Math.max(300, timelineSteps[idx].holdEnd - t) * 1000;
    idx++;
    paused = false;
    if(!step.end){
      pendingTimeout = setTimeout(advance, remaining);
    }
  }

  const scrubberEl = document.getElementById('scrubber');
  scrubberEl.addEventListener('mousedown', () => isDraggingScrubber = true);
  scrubberEl.addEventListener('touchstart', () => isDraggingScrubber = true);
  scrubberEl.addEventListener('change', () => {
    const targetTime = (scrubberEl.value / 1000) * totalDuration;
    seekToVirtualTime(targetTime);
    isDraggingScrubber = false;
  });

  let idx = 0;
  let paused = false;
  let pendingTimeout = null;
  let currentSceneStart = 0;

  const lineEl = document.getElementById('currentLine');
  const wordmarkEl = document.getElementById('wordmarkLayer');
  const waitingEl = document.getElementById('waitingDots');
  const ambientEl = document.getElementById('ambient');
  const finalEl = document.getElementById('finalScene');
  const signatureEl = document.getElementById('signatureLayer');
  const videoEl = document.getElementById('meetingVideo');

  function hideAll(){
    document.querySelectorAll('.page-line').forEach(el => { el.style.transitionDelay = '0s'; });
    lineEl.classList.remove('show');
    wordmarkEl.classList.remove('show', 'big');
    waitingEl.classList.remove('show');
    signatureEl.classList.remove('show');
  }

  function renderStep(step){
    hideAll();
    if(step.shift){ ambientEl.classList.add('dimmed'); }

    if(step.end){
      finalEl.style.display = 'flex';
      requestAnimationFrame(() => finalEl.classList.add('show'));
      return;
    }
    if(step.signature){
      signatureEl.classList.add('show');
      return;
    }
    if(step.wordmark){
      if(step.big) wordmarkEl.classList.add('big');
      wordmarkEl.classList.add('show');
      return;
    }
    if(step.wait){
      waitingEl.classList.add('show');
      return;
    }
    if(step.page){
      lineEl.className = 'stage-page';
      const staggerBase = step.staggerDelay !== undefined ? step.staggerDelay : 1.2;
      lineEl.innerHTML = step.page.map((t, i) => {
        const isLast = i === step.page.length - 1;
        const accentClass = (step.accentLast && isLast) ? ' accent' : '';
        const delay = (i * staggerBase).toFixed(2);
        return `<p class="page-line${accentClass}" style="transition-delay:${delay}s">${t}</p>`;
      }).join('');
      requestAnimationFrame(() => lineEl.classList.add('show'));
      return;
    }
    lineEl.className = 'stage-line';
    if(step.dim) lineEl.classList.add('dim');
    if(step.accent) lineEl.classList.add('accent');
    lineEl.innerHTML = step.text;
    requestAnimationFrame(() => lineEl.classList.add('show'));
  }

  function advance(){
    if(idx >= script.length) return;
    const prevStep = idx > 0 ? script[idx - 1] : null;
    const pauseDuration = (prevStep && prevStep.pauseAfter !== undefined) ? prevStep.pauseAfter : 700;
    segmentEnteredAt = Date.now();
    hideAll();
    pendingTimeout = setTimeout(() => {
      const step = script[idx];
      stepStartedAt = Date.now();
      renderStep(step);
      if(step.end) return;
      idx++;
      if(!paused){
        pendingTimeout = setTimeout(advance, step.hold);
      }
    }, pauseDuration);
  }

  function togglePause(){
    if(videoEl.classList.contains('show')){
      if(videoEl.paused){ videoEl.play(); document.getElementById('pauseBtn').textContent = '❚❚ Pause'; }
      else { videoEl.pause(); document.getElementById('pauseBtn').textContent = '▶ Play'; }
      return;
    }
    paused = !paused;
    document.getElementById('pauseBtn').textContent = paused ? '▶ Play' : '❚❚ Pause';
    if(paused){
      clearTimeout(pendingTimeout);
    } else {
      pendingTimeout = setTimeout(advance, 600);
    }
  }

  function skipScene(){
    if(videoEl.classList.contains('show')){
      videoEl.currentTime = videoEl.duration;
      return;
    }
    clearTimeout(pendingTimeout);
    videoEl.pause();
    document.getElementById('skipBtn').style.display = 'none';
    hideAll();
    idx = script.length - 1;
    const finalStep = script[idx];
    stepStartedAt = Date.now();
    renderStep(finalStep);
  }

  function restartSequence(){
    clearTimeout(pendingTimeout);
    idx = 0;
    paused = false;
    document.getElementById('pauseBtn').textContent = '❚❚ Pause';
    document.getElementById('skipBtn').style.display = 'inline';
    document.getElementById('skipBtn').textContent = 'Skip →';
    ambientEl.classList.remove('dimmed');
    finalEl.classList.remove('show');
    finalEl.style.display = 'none';
    hideAll();
    videoEl.pause();
    videoEl.currentTime = 0;
    videoEl.classList.remove('show');
    signatureEl.classList.remove('hidden');
    signatureEl.classList.add('show');
  }

  function beginExperience(){
    signatureEl.classList.add('hidden');
    videoEl.classList.add('show');
    videoEl.muted = false;
    videoEl.play().catch(err => console.error('Playback needs a user gesture:', err));
  }

  videoEl.addEventListener('ended', () => {
    videoEl.classList.remove('show');
    document.getElementById('skipBtn').textContent = 'Skip to End →';
    idx = 0; // the video has already played the meeting scene, real sequence starts here
    setTimeout(advance, 1500);
  });

  signatureEl.classList.add('show');
</script>
</body>
</html>
